<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bradken VOC – Verificación de Competencias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #F4F6FA; font-family: 'DM Sans', system-ui, sans-serif; }
    input, select, textarea, button { font-family: inherit; }
    input, select, textarea {
      border: 1px solid #E4E7EF; border-radius: 8px;
      padding: 8px 12px; font-size: 13px; outline: none;
      background: #fff; color: #1A1A2E; width: 100%;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: #1B5CA8; }
    textarea { resize: vertical; min-height: 72px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
